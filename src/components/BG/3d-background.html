<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Holographic Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f14;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            height: 100vh;
        }

        /* Canvas positioned as background */
        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            pointer-events: auto;
        }

        /* Demo content to show background effect */
        .content {
            position: relative;
            z-index: 1;
            padding: 2rem;
            color: #40e0d0;
            text-shadow: 0 0 10px rgba(64, 224, 208, 0.3);
        }

        .title {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-align: center;
            margin-top: 20vh;
        }

        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            color: #00ff88;
            letter-spacing: 2px;
        }

        .description {
            max-width: 600px;
            margin: 3rem auto;
            line-height: 1.8;
            color: #b0c4de;
            text-align: center;
        }

        /* Accessibility: Respect reduced motion preferences */
        @media (prefers-reduced-motion: reduce) {
            #three-canvas {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Background -->
    <canvas id="three-canvas"></canvas>

    <!-- Demo Content -->
    <div class="content">
        <h1 class="title">PORTFOLIO</h1>
        <p class="subtitle">3D HOLOGRAPHIC BACKGROUND</p>
        <div class="description">
            This is a demonstration of the 3D holographic background. The wireframe object rotates slowly
            and becomes more active when you hover over the background. The effect is subtle and designed
            to complement terminal-style interfaces without being distracting.
        </div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- 3D Background Script -->
    <script src="./3d-background.js"></script>
</body>
</html>
